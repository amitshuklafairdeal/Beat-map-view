<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',Arial,sans-serif; background:#111; color:#eee; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* ── top bar ── */
  #topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 18px; background:#1a1a2e; border-bottom:2px solid #2d2d5e;
    flex-shrink:0; z-index:2000;
  }
  #topbar h1 { font-size:16px; font-weight:700; color:#fff; letter-spacing:.5px; }
  #topbar .sub { font-size:11px; color:#9999cc; margin-top:2px; }
  #stats { display:flex; gap:14px; }
  .stat-box { background:#16213e; border:1px solid #2d2d5e; border-radius:6px; padding:6px 14px; text-align:center; }
  .stat-box .val { font-size:18px; font-weight:800; color:#7EB8F7; }
  .stat-box .lbl { font-size:10px; color:#8888aa; margin-top:1px; }

  /* ── map ── */
  #map { flex:1; position:relative; }

  /* ── legend ── */
  #legend {
    position:absolute; top:12px; right:12px; z-index:1000;
    background:rgba(20,20,40,0.93); border:1px solid #333;
    border-radius:10px; padding:12px 16px; min-width:210px;
    box-shadow:0 4px 20px rgba(0,0,0,.5);
  }
  #legend h3 { font-size:11px; font-weight:700; color:#ccc; margin-bottom:8px; letter-spacing:.5px; text-transform:uppercase; }
  .leg-item { display:flex; align-items:center; gap:9px; margin:5px 0; cursor:pointer; transition:opacity .2s; user-select:none; }
  .leg-item:hover { opacity:.75; }
  .leg-dot { width:13px; height:13px; border-radius:50%; flex-shrink:0; border:2px solid rgba(255,255,255,.3); }
  .leg-label { font-size:12px; color:#ddd; flex:1; }
  .leg-count { font-size:11px; color:#9999cc; font-weight:600; }
  .leg-item.hidden .leg-label { opacity:.4; text-decoration:line-through; }
  .leg-item.hidden .leg-count { opacity:.4; }

  /* ── filters ── */
  #filters {
    position:absolute; top:12px; left:12px; z-index:1000;
    background:rgba(20,20,40,0.93); border:1px solid #333;
    border-radius:10px; padding:12px 16px; min-width:210px;
    box-shadow:0 4px 20px rgba(0,0,0,.5);
  }
  #filters h3 { font-size:11px; font-weight:700; color:#ccc; margin-bottom:8px; letter-spacing:.5px; text-transform:uppercase; }
  #filters input {
    width:100%; padding:6px 10px; background:#0f0f1f; border:1px solid #3a3a6a;
    border-radius:6px; color:#eee; font-size:12px; outline:none; transition:border .2s;
  }
  #filters input:focus { border-color:#7EB8F7; }
  #wh-filter {
    margin-top:7px; width:100%; padding:5px 8px; background:#0f0f1f;
    border:1px solid #3a3a6a; border-radius:6px; color:#eee; font-size:11px; outline:none; cursor:pointer;
  }

  /* ── count badge ── */
  #count-badge {
    position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
    z-index:1000; background:rgba(20,20,40,0.9); border:1px solid #3a3a6a;
    border-radius:20px; padding:5px 16px; font-size:12px; color:#aaa;
    pointer-events:none; white-space:nowrap;
  }
  #count-badge strong { color:#7EB8F7; }

  /* ── popup ── */
  .leaflet-popup-content-wrapper {
    background:#1a1a2e !important; border:1px solid #3a3a6a !important;
    border-radius:12px !important; color:#eee !important;
    font-family:'Segoe UI',Arial,sans-serif !important;
    box-shadow:0 6px 24px rgba(0,0,0,.7) !important;
    min-width:240px;
  }
  .leaflet-popup-tip { background:#1a1a2e !important; }
  .leaflet-popup-content { margin:14px 16px !important; }
  .popup-store { font-size:13px; font-weight:700; color:#fff; margin-bottom:6px; line-height:1.3; }
  .popup-row { font-size:11px; color:#aaa; margin:3px 0; display:flex; align-items:flex-start; gap:5px; }
  .popup-row .lbl { color:#666; min-width:72px; flex-shrink:0; }
  .popup-row .val { color:#ddd; word-break:break-all; }
  .popup-badge {
    display:inline-block; padding:3px 10px; border-radius:12px;
    font-size:10px; font-weight:700; margin-top:6px; color:#fff; letter-spacing:.3px;
  }
  .popup-divider { border:none; border-top:1px solid #2d2d5e; margin:8px 0; }

  /* ── nav buttons ── */
  .nav-btns { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .nav-btn {
    display:inline-flex; align-items:center; gap:5px;
    padding:6px 11px; border-radius:8px; font-size:11px; font-weight:600;
    text-decoration:none; cursor:pointer; transition:all .15s; border:none;
    white-space:nowrap; flex:1; justify-content:center;
  }
  .nav-btn:hover { filter:brightness(1.15); transform:translateY(-1px); }
  .btn-gmaps  { background:#4285F4; color:#fff; }
  .btn-waze   { background:#05C8F7; color:#000; }
  .btn-apple  { background:#555; color:#fff; }
  .btn-copy   { background:#2d2d5e; color:#aaa; font-size:10px; flex:none; padding:6px 9px; }
  .btn-copy:hover { background:#3d3d7e; color:#fff; }
  .btn-copy.copied { background:#1a5c2b; color:#4CAF50; }

  .nav-section-title {
    font-size:10px; color:#555; text-transform:uppercase; letter-spacing:.5px;
    margin-top:8px; margin-bottom:4px;
  }
</style>

  { name:'Shivam Gaurav',     color:'#4CAF50', count:567 },
  { name:'Amarjeet Tiwari',   color:'#FF9800', count:401 },
  { name:'Akash Rana',        color:'#E63946', count:398 },
  { name:'Sumit Kumar Gupta', color:'#9C27B0', count:382 },
  { name:'Abhinash Kumar',    color:'#00BCD4', count:369 },
];

// ── Detect device for nav links ───────────────────────────────────────────
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isAndroid = /Android/.test(navigator.userAgent);

function navLinks(lat, lon, storeName) {
  const enc = encodeURIComponent(storeName || `${lat},${lon}`);
  const coords = `${lat},${lon}`;
  return {
    gmaps: `https://www.google.com/maps/dir/?api=1&destination=${coords}&travelmode=driving`,
    waze:  `https://waze.com/ul?ll=${coords}&navigate=yes`,
    apple: `http://maps.apple.com/?daddr=${coords}&dirflg=d`,
    gplace:`https://www.google.com/maps/search/?api=1&query=${coords}`,
  };
}

function popupHTML(p) {
  const links = navLinks(p.lat, p.lon, p.store);
  const storeName = p.store || '(No store name)';
  return `
    <div class="popup-store">${storeName}</div>
    <div class="popup-row"><span class="lbl">📞 Contact</span><span class="val">${p.contact || '—'}</span></div>
    <div class="popup-row"><span class="lbl">👤 Salesman</span><span class="val"><span class="popup-badge" style="background:${p.color};padding:2px 7px">${p.salesman}</span></span></div>
    <div class="popup-row"><span class="lbl">📦 Warehouse</span><span class="val">${p.wh || '—'}</span></div>
    <div class="popup-row"><span class="lbl">📍 Coords</span><span class="val">${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}</span></div>

    <hr class="popup-divider"/>
    <div class="nav-section-title">🧭 Navigate to this store</div>
    <div class="nav-btns">
      <a class="nav-btn btn-gmaps" href="${links.gmaps}" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        Google Maps
      </a>
      <a class="nav-btn btn-waze" href="${links.waze}" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="black"><path d="M20.54 6.63C19.84 4.04 17.34 2 14.5 2 11.24 2 8.56 4.38 8.07 7.5 6.3 7.82 4.9 9.1 4.6 10.82 3.1 11.23 2 12.6 2 14.2c0 1.87 1.52 3.38 3.39 3.38h11.2c2.45 0 4.41-1.97 4.41-4.4 0-2.3-1.75-4.18-4-4.4l-.46-2.15zM16 15.5c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-5 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>
        Waze
      </a>
    </div>
    <div class="nav-btns" style="margin-top:5px">
      ${isIOS ? `<a class="nav-btn btn-apple" href="${links.apple}" target="_blank" rel="noopener">🍎 Apple Maps</a>` : ''}
      <a class="nav-btn btn-gmaps" href="${links.gplace}" target="_blank" rel="noopener" style="background:#34A853">
        📌 View on Map
      </a>
      <button class="nav-btn btn-copy" onclick="copyCoords(${p.lat}, ${p.lon}, this)" title="Copy coordinates">
        📋 Copy
      </button>
    </div>
  `;
}

function copyCoords(lat, lon, btn) {
  navigator.clipboard.writeText(`${lat},${lon}`).then(() => {
    btn.textContent = '✅ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 1800);
  });
}

// ── Map init ─────────────────────────────────────────────────────────────
const map = L.map('map', { center:[28.4032,77.0704], zoom:12, preferCanvas:true });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:19
}).addTo(map);

// ── Markers ───────────────────────────────────────────────────────────────
let hiddenSalesmen = new Set();
const layerGroup = L.layerGroup().addTo(map);

function makeMarker(p) {
  return L.circleMarker([p.lat, p.lon], {
    radius: 5.5,
    fillColor: p.color,
    color: 'rgba(255,255,255,0.6)',
    weight: 1,
    fillOpacity: 0.88
  }).bindPopup(popupHTML(p), { maxWidth:290, minWidth:260 });
}

function renderMarkers(pts) {
  layerGroup.clearLayers();
  pts.forEach(p => layerGroup.addLayer(makeMarker(p)));
  document.getElementById('visible-count').textContent = pts.length.toLocaleString();
}

renderMarkers(POINTS);

// Fit bounds
const bounds = L.latLngBounds(POINTS.map(p => [p.lat, p.lon]));
map.fitBounds(bounds, { padding:[50,50] });

// ── Filters ───────────────────────────────────────────────────────────────
function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase().trim();
  const wh     = document.getElementById('wh-filter').value;
  const filtered = POINTS.filter(p => {
    if (hiddenSalesmen.has(p.salesman)) return false;
    if (wh && p.wh !== wh) return false;
    if (search) {
      const hay = (p.store + p.contact + p.salesman).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  renderMarkers(filtered);
}

// ── Legend ────────────────────────────────────────────────────────────────
const legendDiv = document.getElementById('legend-items');
SALESMEN.forEach(sm => {
  const item = document.createElement('div');
  item.className = 'leg-item';
  item.innerHTML = `
    <div class="leg-dot" style="background:${sm.color}"></div>
    <div class="leg-label">${sm.name}</div>
    <div class="leg-count">${sm.count.toLocaleString()}</div>`;
  item.addEventListener('click', () => {
    if (hiddenSalesmen.has(sm.name)) { hiddenSalesmen.delete(sm.name); item.classList.remove('hidden'); }
    else { hiddenSalesmen.add(sm.name); item.classList.add('hidden'); }
    applyFilters();
  });
  legendDiv.appendChild(item);
});
</script>
